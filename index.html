<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onyx - Home</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: #1e1e1e; 
            color: #b5b5b5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            height: 100vh; 
            flex-direction: row; 
            touch-action: manipulation; 
        }
        
        /* ==========================================
           RESPONSIVE SIDEBAR
           ========================================== */
        .sidebar { 
            width: 260px; 
            background-color: #252526; 
            border-right: 1px solid #3c3c3c; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            flex-shrink: 0;
        }
        
        .brand { 
            font-size: 28px; 
            font-weight: bold; 
            color: #ffffff; 
            margin-bottom: 20px; 
            letter-spacing: 1px; 
        }

        .sidebar-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        
        .menu-btn { 
            width: 100%; 
            padding: 12px; 
            background-color: #333333; 
            border: 1px solid #454545; 
            color: #e0e0e0; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px; 
            text-align: left; 
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.1s;
        }
        
        .menu-btn.primary { 
            background-color: #007acc; 
            border-color: #0098ff; 
            color: white; 
            font-weight: bold; 
        }
        
        .menu-btn:active { background-color: #444; }
        .menu-btn.primary:active { background-color: #005994; }
        
        /* ==========================================
           MAIN CONTENT & PROJECT GRID
           ========================================== */
        .content { 
            flex: 1; 
            padding: 40px; 
            overflow-y: auto; 
        }
        
        .content h2 { 
            font-size: 20px; 
            color: #ffffff; 
            margin-bottom: 20px; 
            font-weight: 500; 
        }
        
        .projects-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); 
            gap: 20px; 
        }
        
        .project-card { 
            background-color: #252526; 
            border: 1px solid #3c3c3c; 
            border-radius: 6px; 
            overflow: hidden; 
            position: relative;
        }
        
        .card-click-area {
            cursor: pointer;
            width: 100%;
        }
        
        .project-thumb { 
            width: 100%; 
            height: 110px; 
            background-color: #222;
            background-image: linear-gradient(45deg, #2b2b2b 25%, transparent 25%), 
                              linear-gradient(-45deg, #2b2b2b 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #2b2b2b 75%), 
                              linear-gradient(-45deg, transparent 75%, #2b2b2b 75%);
            background-size: 10px 10px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            border-bottom: 1px solid #3c3c3c;
        }
        
        .project-thumb img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
        
        .project-info { 
            padding: 10px; 
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .project-name { 
            font-size: 13px; 
            color: #e0e0e0; 
            font-weight: bold; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .project-date { font-size: 11px; color: #666; }

        .card-tools {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #333;
            margin-top: 5px;
            padding-top: 6px;
            gap: 6px;
        }

        .card-tool-btn {
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            color: #aaa;
            cursor: pointer;
            font-size: 12px;
            padding: 6px 0;
            flex: 1;
            text-align: center;
            border-radius: 4px;
        }

        /* ==========================================
           MODAL PANEL (PRESET CANVAS SELECTION)
           ========================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-box {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .modal-box h3 { color: #fff; margin-bottom: 15px; font-size: 18px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .form-group input { width: 100%; background: #1e1e1e; border: 1px solid #454545; padding: 10px; color: #fff; border-radius: 4px; font-size: 14px; }

        .presets-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .preset-card {
            background: #333;
            border: 1px solid #454545;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: background 0.1s;
        }
        .preset-card:active { background: #007acc; border-color: #0098ff; }
        .preset-title { font-size: 12px; font-weight: bold; color: #fff; display: block; }
        .preset-size { font-size: 10px; color: #aaa; }

        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .modal-btn.cancel { background: #444; color: #ccc; }
        .modal-btn.confirm { background: #007acc; color: white; font-weight: bold; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 12px 20px; border-right: none; border-bottom: 1px solid #3c3c3c; flex-direction: row; justify-content: space-between; align-items: center; }
            .brand { margin-bottom: 0; font-size: 22px; }
            .sidebar-actions { flex-direction: row; width: auto; gap: 8px; }
            .menu-btn { width: auto; padding: 8px 12px; font-size: 12px; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">Onyx</div>
        <div class="sidebar-actions">
            <button class="menu-btn primary" id="btn-new">➕ New Art</button>
            <button class="menu-btn" id="btn-import">📥 Import</button>
        </div>
        <input type="file" id="file-input" accept=".onyx" style="display: none;">
    </div>

    <div class="content">
        <h2>Recent Projects</h2>
        <div id="no-projects" style="color: #666; font-size: 14px;">No projects found in local storage (odb).</div>
        <div class="projects-grid" id="projects-list"></div>
    </div>

    <div class="modal-overlay" id="preset-modal">
        <div class="modal-box">
            <h3>New Canvas Options</h3>
            
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" id="input-proj-name" value="New Onyx Art">
            </div>

            <label style="display:block; font-size:12px; color:#aaa; margin-bottom:8px;">Choose a Preset Layout</label>
            <div class="presets-grid">
                <div class="preset-card" onclick="applyPreset(1080, 1080)">
                    <span class="preset-title">📸 Instagram Post</span>
                    <span class="preset-size">1080 x 1080 (1:1)</span>
                </div>
                <div class="preset-card" onclick="applyPreset(1080, 1920)">
                    <span class="preset-title">📱 TikTok / Reels</span>
                    <span class="preset-size">1080 x 1920 (9:16)</span>
                </div>
                <div class="preset-card" onclick="applyPreset(1280, 720)">
                    <span class="preset-title">📺 YouTube Video</span>
                    <span class="preset-size">1280 x 720 (16:9)</span>
                </div>
                <div class="preset-card" onclick="applyPreset(800, 800)">
                    <span class="preset-title">⚙️ Dev Square</span>
                    <span class="preset-size">800 x 800 (1:1)</span>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <div class="form-group" style="flex:1; margin:0;">
                    <label>Width (px)</label>
                    <input type="number" id="input-width" value="360">
                </div>
                <div class="form-group" style="flex:1; margin:0;">
                    <label>Height (px)</label>
                    <input type="number" id="input-height" value="480">
                </div>
            </div>

            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closePresetModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="commitProjectCreation()">Create Canvas</button>
            </div>
        </div>
    </div>

    <script>
        let db;
        
        window.addEventListener('DOMContentLoaded', () => {
            const request = indexedDB.open("odb", 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore("projects", { keyPath: "id" });
            request.onsuccess = (e) => {
                db = e.target.result;
                loadProjects();
            };

            document.getElementById('btn-new').onclick = openPresetModal;
            document.getElementById('btn-import').onclick = () => document.getElementById('file-input').click();
            document.getElementById('file-input').onchange = importProject;
        });

        function loadProjects() {
            const transaction = db.transaction(["projects"], "readonly");
            const store = transaction.objectStore("projects");
            
            store.getAll().onsuccess = (e) => {
                const projects = e.target.result || [];
                const msg = document.getElementById('no-projects');
                const list = document.getElementById('projects-list');
                
                list.innerHTML = '';
                if (projects.length > 0) msg.style.display = 'none';
                else { msg.style.display = 'block'; return; }
                
                projects.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    const imgSrc = (p.layers && p.layers.paint) ? p.layers.paint : "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

                    card.innerHTML = `
                        <div class="card-click-area" onclick="window.location.href='home.html?id=${p.id}'">
                            <div class="project-thumb"><img src="${imgSrc}"></div>
                            <div class="project-info">
                                <div class="project-name">${p.name}</div>
                                <div class="project-date">${p.lastModified}</div>
                            </div>
                        </div>
                        <div class="project-info" style="padding-top:0;">
                            <div class="card-tools">
                                <button class="card-tool-btn" onclick="renameProject('${p.id}', event)">✏️</button>
                                <button class="card-tool-btn" onclick="duplicateProject('${p.id}', event)">📋</button>
                                <button class="card-tool-btn" onclick="exportProject('${p.id}', event)">📤</button>
                                <button class="card-tool-btn" onclick="deleteProject('${p.id}', event)">❌</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            };
        }

        /* ==========================================
           MODAL INTERACTION LOGIC
           ========================================== */
        function openPresetModal() {
            document.getElementById('preset-modal').style.display = 'flex';
        }

        function closePresetModal() {
            document.getElementById('preset-modal').style.display = 'none';
        }

        function applyPreset(w, h) {
            document.getElementById('input-width').value = w;
            document.getElementById('input-height').value = h;
        }

        function commitProjectCreation() {
            const name = document.getElementById('input-proj-name').value.trim() || "New Onyx Art";
            const w = parseInt(document.getElementById('input-width').value) || 360;
            const h = parseInt(document.getElementById('input-height').value) || 480;

            const newId = "proj_" + Date.now();
            const tx = db.transaction(["projects"], "readwrite");
            
            tx.objectStore("projects").put({
                id: newId,
                name: name,
                width: w,
                height: h,
                lastModified: new Date().toLocaleDateString('en-US'),
                layersList: []
            }).onsuccess = () => {
                window.location.href = `home.html?id=${newId}`;
            };
        }

        // Project Utilities Operations
        function deleteProject(id, event) {
            event.stopPropagation();
            if (!confirm("Delete project permanently?")) return;
            db.transaction(["projects"], "readwrite").objectStore("projects").delete(id).onsuccess = () => loadProjects();
        }

        function renameProject(id, event) {
            event.stopPropagation();
            const store = db.transaction(["projects"], "readwrite").objectStore("projects");
            store.get(id).onsuccess = (e) => {
                const p = e.target.result;
                if (!p) return;
                const newName = prompt("New name:", p.name);
                if (!newName) return;
                p.name = newName;
                store.put(p).onsuccess = () => loadProjects();
            };
        }

        function duplicateProject(id, event) {
            event.stopPropagation();
            const store = db.transaction(["projects"], "readwrite").objectStore("projects");
            store.get(id).onsuccess = (e) => {
                const p = e.target.result;
                if (!p) return;
                const clone = { ...p, id: "proj_" + Date.now(), name: p.name + " - Copy", lastModified: new Date().toLocaleDateString('en-US') };
                store.put(clone).onsuccess = () => loadProjects();
            };
        }

        function exportProject(id, event) {
            event.stopPropagation();
            db.transaction(["projects"], "readonly").objectStore("projects").get(id).onsuccess = (e) => {
                const p = e.target.result; if (!p) return;
                const blob = new Blob([JSON.stringify(p)], { type: "application/json" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `${p.name.replace(/\s+/g, '_')}.onyx`;
                link.click();
            };
        }

        function importProject(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const data = JSON.parse(evt.target.result);
                    if (!data.id) return;
                    data.id = "proj_" + Date.now();
                    data.lastModified = new Date().toLocaleDateString('en-US') + " (Imported)";
                    db.transaction(["projects"], "readwrite").objectStore("projects").put(data).onsuccess = () => loadProjects();
                } catch { alert("Invalid .onyx structure"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
